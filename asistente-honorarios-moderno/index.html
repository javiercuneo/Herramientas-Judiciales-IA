<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Honorio</title>
  <link rel="icon" href="img/honorio.png" type="image/png">
  <link rel="stylesheet" href="styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app-container">
    <!-- Header con Stepper -->
    <header class="header">
      <div class="header-content">
        <div class="logo" id="headerLogo">
          <img src="img/honorio.png" alt="Honorio" class="header-mascot" id="headerMascot">
        </div>
        <div class="stepper" id="stepper">
          <!-- Se genera dinámicamente -->
        </div>
      </div>
      <!-- Barra de resumen de elecciones -->
      <div class="summary-bar" id="summaryBar">
        <!-- Se genera dinámicamente -->
      </div>
    </header>

    <!-- Contenido Principal -->
    <main class="main-content" id="mainContent">
      <!-- Los pasos se renderizan aquí -->
    </main>

    <!-- Footer de navegación -->
    <footer class="footer">
      <div class="footer-nav">
        <button class="btn btn-outline" id="btnReiniciar" title="Reiniciar cálculo">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
          Reiniciar
        </button>
        <div class="footer-nav-center">
          <button class="btn btn-secondary" id="btnBack" disabled>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M19 12H5M12 19l-7-7 7-7"/>
            </svg>
            Atrás
          </button>
          <button class="btn btn-primary" id="btnNext">
            Siguiente
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M5 12h14M12 5l7 7-7 7"/>
            </svg>
          </button>
        </div>
      </div>
    </footer>
  </div>

  <!-- Módulos de cálculo del wizard original -->
  <script src="js/core.js"></script>
  <script src="js/state.js"></script>
  <script src="js/calculations.js"></script>
  <!-- UI y navegación del nuevo diseño -->
  <script src="app.js"></script>
</body>
</html>
