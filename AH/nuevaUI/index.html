<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculadora de Honorarios - Ley 27.423</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app-container">
    <!-- Header con Stepper -->
    <header class="header">
      <div class="header-content">
        <h1 class="logo">Honorarios</h1>
        <div class="stepper" id="stepper">
          <!-- Se genera dinámicamente -->
        </div>
      </div>
      <!-- Barra de resumen de elecciones -->
      <div class="summary-bar" id="summaryBar">
        <!-- Se genera dinámicamente -->
      </div>
    </header>

    <!-- Contenido Principal -->
    <main class="main-content" id="mainContent">
      <!-- Los pasos se renderizan aquí -->
    </main>

    <!-- Footer con explicaciones y navegación -->
    <footer class="footer">
      <div class="footer-info" id="footerInfo">
        <p>Bienvenido al asistente de cálculo de honorarios profesionales.</p>
      </div>
      <div class="footer-nav">
        <button class="btn btn-secondary" id="btnBack" disabled>
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M19 12H5M12 19l-7-7 7-7"/>
          </svg>
          Atrás
        </button>
        <button class="btn btn-primary" id="btnNext">
          Siguiente
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M5 12h14M12 5l7 7-7 7"/>
          </svg>
        </button>
      </div>
    </footer>
  </div>

  <!-- Módulos de cálculo del wizard original -->
  <script src="../js/core.js"></script>
  <script src="../js/state.js"></script>
  <script src="../js/calculations.js"></script>
  <!-- UI y navegación del nuevo diseño -->
  <script src="app.js"></script>
</body>
</html>
